name: Production Promotion

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

concurrency:
  group: production-promotion
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  promote:
    name: Promote to production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: https://example.com
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download CI artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v8
        with:
          name: github-actions-showcase-${{ github.event.workflow_run.run_number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ci-artifact

      - name: Inspect downloaded artifact
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          ls -lh ci-artifact
          unzip -l ci-artifact/github-actions-showcase.zip | head

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Confirm promotion inputs
        run: |
          echo "Promoting validated change to the production environment"
          echo "Run ID: ${{ github.run_id }}"
