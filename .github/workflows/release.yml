name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "## What's changed" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          git log --pretty=format:"- %s" "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"..HEAD >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: zip -r github-actions-showcase-${{ github.ref_name }}.zip src tests README.md requirements.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: github-actions-showcase-${{ github.ref_name }}.zip
          body: ${{ steps.changelog.outputs.notes }}
